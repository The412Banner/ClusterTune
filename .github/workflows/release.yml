name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.4.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve version
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${tag#v}" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest

      # This fork has no signing secrets, so we ship the debug-keystore APK.
      # Each build uses a fresh ephemeral debug key; uninstall any prior build
      # before reinstalling (INSTALL_FAILED_UPDATE_INCOMPATIBLE otherwise).
      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Prepare release assets
        run: |
          version="${{ steps.version.outputs.version }}"
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/ClusterTune-v${version}.apk"
          sha256sum "release/ClusterTune-v${version}.apk" > "release/ClusterTune-v${version}.apk.sha256"

      - name: Create GitHub release
        run: |
          tag="${{ steps.version.outputs.tag }}"
          notes_file="docs/RELEASE_NOTES_${tag}.md"
          if [ -f "$notes_file" ]; then
            gh release create "$tag" release/* \
              --title "ClusterTune ${tag}" \
              --notes-file "$notes_file"
          else
            gh release create "$tag" release/* \
              --title "ClusterTune ${tag}" \
              --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
